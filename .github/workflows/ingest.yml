name: FIDE monthly ingestion (build SQLite)

# Fully automatic, zero cost. Runs daily and publishes a new SQLite database
# only when FIDE actually releases a new monthly list.
#
# Change detection is keyed off the FIDE list's rating PERIOD (YYYY-MM), which
# we read cheaply from the download's Last-Modified header. Each monthly list
# becomes one release tagged "fide-YYYY-MM", so a daily run that finds an
# already-published period does nothing (no download, no build, no release).
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

# gh release create needs write access to repository contents.
permissions:
  contents: write

concurrency:
  group: fide-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Determine current FIDE rating period
        id: period
        working-directory: backend
        # Cheap HEAD request (falls back to a full download only if FIDE omits
        # the Last-Modified header). Prints e.g. "2026-06".
        run: |
          PERIOD="$(python -m ingestion.ingest --print-period)"
          if [ -z "$PERIOD" ]; then
            echo "Could not determine rating period." >&2
            exit 1
          fi
          echo "value=$PERIOD" >> "$GITHUB_OUTPUT"
          echo "FIDE current period: $PERIOD"

      - name: Check whether this period is already published
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="fide-${{ steps.period.outputs.value }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — nothing to do."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "No release for $TAG yet — will build and publish."
          fi

      - name: Check this month's per-type archives are published
        id: archives
        if: steps.check.outputs.publish == 'true'
        # The archived standard/rapid/blitz lists are the only source of
        # per-time-control activity flags (the combined list's flag mirrors
        # the standard list). FIDE sometimes uploads them a little after the
        # combined list, and a release is only ever built once per period —
        # so defer the whole build until all three exist; the daily cron
        # retries tomorrow.
        run: |
          PERIOD="${{ steps.period.outputs.value }}"
          MON="$(date -u -d "${PERIOD}-01" +%b | tr '[:upper:]' '[:lower:]')"
          YY="${PERIOD:2:2}"
          READY=true
          for kind in standard rapid blitz; do
            URL="https://ratings.fide.com/download/${kind}_${MON}${YY}frl_xml.zip"
            if curl -sIfL -A "fide-tracker/1.0 (+monthly rating-history sync)" "$URL" >/dev/null; then
              echo "found    $URL"
            else
              echo "missing  $URL — deferring the build to a later run."
              READY=false
            fi
          done
          echo "ready=$READY" >> "$GITHUB_OUTPUT"

      - name: Seed database from the previous release
        if: steps.check.outputs.publish == 'true' && steps.archives.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Each release ships the full history, so start from the previous
        # database and add the new month on top. On the very first run there
        # is nothing to download and the backfill below builds the history.
        run: |
          if gh release download --repo "$GITHUB_REPOSITORY" --pattern fide.db --dir backend; then
            echo "Seeded backend/fide.db from the latest release."
          else
            echo "No previous release — the backfill step will build the history."
          fi

      - name: Backfill history (last 24 months)
        if: steps.check.outputs.publish == 'true' && steps.archives.outputs.ready == 'true'
        working-directory: backend
        # One-time: downloads FIDE's archived monthly lists so charts have
        # two years of data (~1-2 h on the first run). Once the seeded
        # database already contains the history this is a no-op.
        run: python -m ingestion.backfill --months 24

      - name: Build SQLite database (current month)
        if: steps.check.outputs.publish == 'true' && steps.archives.outputs.ready == 'true'
        working-directory: backend
        run: |
          python -m ingestion.ingest --period "${{ steps.period.outputs.value }}"
          sqlite3 fide.db "VACUUM;"
          ls -lh fide.db

      - name: Publish release
        if: steps.check.outputs.publish == 'true' && steps.archives.outputs.ready == 'true'
        working-directory: backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="fide-${{ steps.period.outputs.value }}"
          gh release create "$TAG" fide.db \
            --repo "$GITHUB_REPOSITORY" \
            --title "FIDE ratings ${{ steps.period.outputs.value }}" \
            --notes "Monthly FIDE rating snapshot (${{ steps.period.outputs.value }}). The app downloads fide.db from the latest release automatically."
